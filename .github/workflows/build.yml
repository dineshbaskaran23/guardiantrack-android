name: Build GuardianTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept SDK licenses
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\n" > $ANDROID_SDK_ROOT/licenses/android-sdk-license

      - name: Install SDK platform
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Download official gradlew
        run: |
          curl -sL -o gradlew "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew"
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: GuardianTrack-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
